<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ElectED — Election Process Assistant</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',sans-serif; background:#0f172a; color:#e2e8f0; height:100vh; display:flex; flex-direction:column; }

  /* Header */
  header { background:linear-gradient(135deg,#1e3a8a,#1d4ed8); padding:14px 20px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 12px rgba(0,0,0,0.4); }
  .logo { width:40px; height:40px; background:#fff; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; }
  .header-text h1 { font-size:20px; font-weight:800; color:#fff; }
  .header-text p  { font-size:12px; color:#93c5fd; }
  .badge { margin-left:auto; background:#16a34a; color:#fff; font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; }

  /* Quick topics */
  .topics { display:flex; gap:8px; padding:12px 16px; overflow-x:auto; background:#1e293b; border-bottom:1px solid #334155; flex-shrink:0; }
  .topic-btn { background:#1e3a8a; color:#93c5fd; border:1px solid #2563eb; border-radius:20px; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
  .topic-btn:hover { background:#2563eb; color:#fff; }

  /* Chat area */
  #chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:14px; }

  .msg { display:flex; gap:10px; animation:fadeIn 0.3s ease; }
  .msg.user { flex-direction:row-reverse; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .bot-av  { background:#1e3a8a; }
  .user-av { background:#16a34a; }

  .bubble { max-width:78%; padding:12px 16px; border-radius:16px; font-size:14px; line-height:1.6; }
  .bot-bubble  { background:#1e293b; border:1px solid #334155; border-top-left-radius:4px; }
  .user-bubble { background:#1d4ed8; border-top-right-radius:4px; }

  .bubble h3   { font-size:15px; font-weight:700; margin-bottom:8px; color:#60a5fa; }
  .bubble ul   { padding-left:18px; }
  .bubble li   { margin-bottom:4px; }
  .bubble .step{ background:#0f172a; border-left:3px solid #3b82f6; padding:6px 10px; margin:6px 0; border-radius:0 8px 8px 0; font-size:13px; }
  .bubble .tag { display:inline-block; background:#1e3a8a; color:#93c5fd; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700; margin:2px; }
  .bubble .highlight { background:#fef3c7; color:#92400e; border-radius:6px; padding:2px 8px; font-size:12px; font-weight:700; }

  /* Input */
  .input-area { padding:12px 16px; background:#1e293b; border-top:1px solid #334155; display:flex; gap:10px; flex-shrink:0; }
  #userInput { flex:1; background:#0f172a; border:1px solid #334155; border-radius:12px; padding:12px 16px; color:#e2e8f0; font-size:14px; outline:none; transition:border 0.2s; }
  #userInput:focus { border-color:#3b82f6; }
  #sendBtn { background:#1d4ed8; color:#fff; border:none; border-radius:12px; padding:12px 20px; font-size:14px; font-weight:700; cursor:pointer; transition:background 0.2s; }
  #sendBtn:hover { background:#2563eb; }

  /* Typing indicator */
  .typing { display:flex; gap:4px; align-items:center; padding:8px 12px; }
  .dot { width:8px; height:8px; background:#3b82f6; border-radius:50%; animation:bounce 1s infinite; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:#1e293b} ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="logo">🗳️</div>
  <div class="header-text">
    <h1>ElectED</h1>
    <p>Your AI Election Education Assistant</p>
  </div>
  <div class="badge">Powered by Gemini</div>
</header>

<div class="topics" id="topics">
  <button class="topic-btn" onclick="ask('How does voting work in India?')">🗳️ How Voting Works</button>
  <button class="topic-btn" onclick="ask('What is the election timeline in India?')">📅 Election Timeline</button>
  <button class="topic-btn" onclick="ask('How to register as a voter?')">📝 Voter Registration</button>
  <button class="topic-btn" onclick="ask('What is EVM and VVPAT?')">💻 EVM & VVPAT</button>
  <button class="topic-btn" onclick="ask('Who can contest elections in India?')">🏛️ Contest Elections</button>
  <button class="topic-btn" onclick="ask('What is Model Code of Conduct?')">📋 Code of Conduct</button>
  <button class="topic-btn" onclick="ask('How are election results counted?')">📊 Vote Counting</button>
  <button class="topic-btn" onclick="ask('What is NOTA?')">❌ What is NOTA?</button>
</div>

<div id="chat"></div>

<div class="input-area">
  <input id="userInput" type="text" placeholder="Ask anything about elections... (e.g. How do I vote?)" onkeydown="if(event.key==='Enter')sendMsg()"/>
  <button id="sendBtn" onclick="sendMsg()">Send ➤</button>
</div>

<script>
const GEMINI_KEY = "AIzaSyBPm1RdG8BBcDm2V70DRpD-AzuW30nqow0";
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

const SYSTEM = `You are ElectED, a friendly and knowledgeable Election Education Assistant specializing in Indian elections. 
Your role is to help citizens understand:
- The complete election process step by step
- Voter registration and eligibility
- How to use EVMs (Electronic Voting Machines) and VVPATs
- Election timelines and schedules
- Candidate nomination process
- Model Code of Conduct
- Vote counting and result declaration
- Rights and responsibilities of voters
- Different types of elections (Lok Sabha, Rajya Sabha, State Assembly, Local Body)
- Election Commission of India's role
- NOTA (None of the Above)
- Postal ballots and overseas voting

Always be:
- Simple and easy to understand (explain like talking to a first-time voter)
- Structured with clear steps when explaining processes
- Accurate with Indian election laws and procedures
- Encouraging about civic participation
- Use emojis to make responses engaging
- Format responses with clear headings and bullet points when appropriate
- Keep responses concise but comprehensive

If asked about specific candidate opinions or political parties' ideologies, remain neutral and factual.`;

let history = [];

function addMsg(role, html, isHTML=false) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const isBot = role === 'bot';
  div.innerHTML = `
    <div class="avatar ${isBot?'bot-av':'user-av'}">${isBot?'🤖':'👤'}</div>
    <div class="bubble ${isBot?'bot-bubble':'user-bubble'}">${isHTML?html:escHtml(html)}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = 'typing';
  div.innerHTML = `<div class="avatar bot-av">🤖</div><div class="bubble bot-bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { document.getElementById('typing')?.remove(); }

function formatResponse(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/#{1,3}\s(.+)/g,'<h3>$1</h3>')
    .replace(/\n\n/g,'<br/><br/>')
    .replace(/\n[-•]\s(.+)/g,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/\n/g,'<br/>');
}

async function ask(question) {
  document.getElementById('userInput').value = question;
  await sendMsg();
}

async function sendMsg() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMsg('user', text);
  history.push({ role:'user', parts:[{text}] });

  showTyping();

  try {
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        system_instruction: { parts:[{text: SYSTEM}] },
        contents: history,
        generationConfig: { temperature:0.7, maxOutputTokens:800 }
      })
    });

    const data = await res.json();
    removeTyping();

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "I'm having trouble connecting. Please try again!";
    history.push({ role:'model', parts:[{text:reply}] });
    addMsg('bot', formatResponse(reply), true);
  } catch(e) {
    removeTyping();
    addMsg('bot', '⚠️ Connection error. Please check your API key and try again.', true);
  }
}

// Welcome message
window.onload = () => {
  addMsg('bot', `<h3>🗳️ Welcome to ElectED!</h3>
I'm your Election Education Assistant, here to help you understand everything about the Indian election process.<br/><br/>
<strong>I can help you with:</strong><br/>
<span class="tag">📝 Voter Registration</span> <span class="tag">🗳️ How to Vote</span> <span class="tag">💻 EVM & VVPAT</span><br/>
<span class="tag">📅 Election Timeline</span> <span class="tag">📊 Vote Counting</span> <span class="tag">🏛️ Candidate Rules</span><br/><br/>
Click any topic above or type your question below. Your vote matters! 🇮🇳`, true);
};
</script>
</body>
</html>
